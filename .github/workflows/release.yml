name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o ./publish

      - name: Generate version and changelog
        id: version
        shell: bash
        run: |
          DATE=$(date +%Y.%m.%d)
          SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${SHORT}" >> $GITHUB_OUTPUT
          echo "name=EASYSID ${DATE} (${SHORT})" >> $GITHUB_OUTPUT

          # Find previous release tag
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Build changelog from commit messages, exclude docs-only commits
          CHANGELOG=$(git log $RANGE --pretty=format:"- %s" --no-merges | grep -vi "README\|docs\|typo\|Co-Authored" || echo "- Initial release")

          # Write multiline output
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Delete existing release
        shell: bash
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            ./publish/EASYSID.exe \
            --title "${{ steps.version.outputs.name }}" \
            --notes "$(cat <<'EOF'
          ## Changes

          ${{ steps.version.outputs.changelog }}

          ---
          Auto-build from commit ${{ github.sha }}
          EOF
          )" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
